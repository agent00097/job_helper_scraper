# Non-secret RabbitMQ worker settings (checked into the image / repo).
# Secrets: RABBITMQ_PASSWORD (required). Optional: RABBITMQ_USER.
#
# Broker `host` is used only when RABBITMQ_HOST is unset. The harco Deployment sets
# RABBITMQ_HOST, so this file’s host is mainly for local runs or other environments.
# Local + port-forward: use RABBITMQ_HOST=127.0.0.1 (or set host: 127.0.0.1 here).
#
# Optional env overrides: RABBITMQ_HOST, RABBITMQ_PORT, RABBITMQ_VHOST, RABBITMQ_QUEUE.
# Override file path: RABBITMQ_WORKER_CONFIG=/path/to/custom.yaml

host: rabbitmq-0.rabbitmq-headless.infra.svc.cluster.local
port: 5672
virtual_host: "jobs"
queue_name: job_scrape_requests
prefetch_count: 2
reconnect_delay_seconds: 5
requeue_on_failure: true
username: job_worker
