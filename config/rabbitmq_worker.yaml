# Non-secret RabbitMQ worker settings (checked into the image / repo).
# Secrets: RABBITMQ_PASSWORD (required). Optional: RABBITMQ_USER.
#
# Broker `host` is a fallback when RABBITMQ_HOST is unset. In harco, the Deployment sets
# RABBITMQ_HOST to the RabbitMQ StatefulSet pod (e.g. rabbitmq-0.rabbitmq-headless.infra...).
#
# Optional env overrides: RABBITMQ_HOST, RABBITMQ_PORT, RABBITMQ_VHOST, RABBITMQ_QUEUE.
# Override file path: RABBITMQ_WORKER_CONFIG=/path/to/custom.yaml

host: rabbitmq
port: 5672
virtual_host: "jobs"
queue_name: job_scrape_requests
prefetch_count: 2
reconnect_delay_seconds: 5
requeue_on_failure: true
username: job_worker
