apiVersion: v1
kind: ConfigMap
metadata:
  name: jobscraper-config
  namespace: harco
  labels:
    app: jobscraper
data:
  DB_HOST: "app-postgres-rw.infra.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "resume_jobs"
  DB_USER: "resume_user"
  # CloudNativePG in-cluster: prefer TLS; set to disable only if your operator setup requires it
  PGSSLMODE: "prefer"
