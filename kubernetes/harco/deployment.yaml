# Long-running scraper worker: keep a single replica. Scaling replicas above 1 runs
# duplicate Scheduler instances and duplicates scraping work against the same DB/sources.
# There is no Service or Ingress; the app does not listen for HTTP.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobscraper
  namespace: harco
  labels:
    app: jobscraper
spec:
  # Pinned: do not scale up without refactoring (see comment above).
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jobscraper
  template:
    metadata:
      labels:
        app: jobscraper
    spec:
      # Committed intentionally for private GHCR pulls in harco (no manual patch).
      imagePullSecrets:
        - name: ghcr-pull-secret
      terminationGracePeriodSeconds: 60
      containers:
        - name: scraper
          # deploy.sh replaces PLACEHOLDER_IMAGE before apply (avoids invalid first pull)
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: jobscraper-config
          env:
            # Secret shape must match kubernetes/scripts/sync-jobscraper-db-secret.sh
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jobscraper-db
                  key: DB_PASSWORD
          # Bursts during scrapes (HTTP + DB); limits cap noisy neighbor impact on a single-node k3s host.
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          # No liveness/readiness probes: this process is not an HTTP server. Crash/hang
          # handling is documented in README (avoid fake HTTP probes; exec probes can
          # restart during legitimately long scrapes).
