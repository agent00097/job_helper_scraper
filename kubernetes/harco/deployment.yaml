apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobscraper
  namespace: harco
  labels:
    app: jobscraper
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jobscraper
  template:
    metadata:
      labels:
        app: jobscraper
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      terminationGracePeriodSeconds: 60
      containers:
        - name: scraper
          # deploy.sh replaces PLACEHOLDER_IMAGE before apply (avoids invalid first pull)
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: jobscraper-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jobscraper-db
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
