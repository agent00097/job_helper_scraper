name: Build and deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image repository (lowercase for GHCR)
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:latest

      - name: Deploy on Hetzner (SSH + kubectl)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: ${{ vars.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ vars.HETZNER_REPO_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            chmod +x kubernetes/harco/deploy.sh kubernetes/scripts/sync-jobscraper-db-secret.sh
            ./kubernetes/harco/deploy.sh "${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ github.sha }}"
